<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShowYourPride Bot</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7fb;
      --text: #1f2430;
      --muted: #5f6878;
      --card: #ffffff;
      --line: #d9deea;
      --accent: #5865f2;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #151820;
        --text: #f1f3f8;
        --muted: #b8bfcc;
        --card: #202430;
        --line: #323848;
      }
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.65 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px;
    }

    section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 32px;
    }

    h1 {
      margin: 0 0 8px;
      line-height: 1.15;
      font-size: clamp(2rem, 5vw, 3rem);
    }

    p {
      color: var(--muted);
    }

    nav {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>ShowYourPride Bot</h1>
      <p>
        Rechtliche Informationen zum Discord-Bot der ShowYourPride-Community.
      </p>

      <nav aria-label="Rechtliche Seiten">
        <a href="bot-nutzungsbedingungen.html">Nutzungsbedingungen</a>
        <a href="bot-datenschutz.html">Datenschutzerklaerung</a>
      </nav>
    </section>
  </main>
</body>
</html>
